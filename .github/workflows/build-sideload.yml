name: Build iOS IPA & Android APK for Sideloading

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/build-sideload.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11
      
      - name: Install dependencies
        run: pnpm install --force
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: '35.0.0'
          ndk: '27.1.12297006'
      
      - name: Build Android APK
        working-directory: packages/mobile
        run: |
          npx expo prebuild --clean
          cd android
          ./gradlew assembleRelease
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: packages/mobile/android/app/build/outputs/apk/release/
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11
      
      - name: Install dependencies
        run: pnpm install --force
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build iOS IPA
        working-directory: packages/mobile
        run: |
          npx expo prebuild --clean --platform ios
          cd ios
          xcodebuild -workspace CommonGround.xcworkspace \
            -scheme CommonGround \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/CommonGround.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/CommonGround.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: packages/mobile/ios/build/ipa/
          retention-days: 30

  create-release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/android
      
      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ./artifacts/ios
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: sideload-${{ github.run_number }}
          release_name: Sideload Build ${{ github.run_number }}
          body: |
            # CommonGround Sideload Build
            
            Download the APK and IPA files below for sideloading:
            - **Android APK**: Use with Sideloadly or ADB
            - **iOS IPA**: Use with AltStore, Sideloadly, or Xcode
          draft: false
          prerelease: false
      
      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/android/release/app-release.apk
          asset_name: CommonGround.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Upload IPA to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/ios/CommonGround.ipa
          asset_name: CommonGround.ipa
          asset_content_type: application/octet-stream
