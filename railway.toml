[build]
  builder = "NIXPACKS"
  buildCommand = "pnpm --filter @axmcommonground/server install --no-frozen-lockfile && pnpm --filter @axmcommonground/server build"

[deploy]
  startCommand = "node packages/server/dist/src/index.js"
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
